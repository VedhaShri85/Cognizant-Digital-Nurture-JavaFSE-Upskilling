<!DOCTYPE html>
<html>
<head>

<style>

table{

border-collapse:collapse;

width:100%;

}

th,td{

border:1px solid black;

padding:10px;

text-align:center;

}

th{

background-color:lightblue;

}

tr:nth-child(even){

background-color:#f2f2f2;

}

</style>

</head>

<body>

<table>

<tr>
<th>ID</th>
<th>Event</th>
</tr>

<tr>
<td>1</td>
<td>Music Fest</td>
</tr>

<tr>
<td>2</td>
<td>Workshop</td>
</tr>

</table>

</body>
</html>
