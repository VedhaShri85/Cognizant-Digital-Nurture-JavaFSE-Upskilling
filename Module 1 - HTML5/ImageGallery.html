<!DOCTYPE html>
<html>

<head>

    <title>Image Gallery</title>

    <style>

        .eventImage {
            width: 180px;
            height: 120px;
            border: 3px solid black;
        }

    </style>

</head>

<body>

    <h2>Community Event Gallery</h2>

    <table border="1">

        <tr>

            <td>
                <img src="event1.jpg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="eventImage">

                <p>Music Festival</p>
            </td>

            <td>
                <img src="event2.jpg"
                     alt="Sports Event"
                     title="Sports Event"
                     class="eventImage">

                <p>Sports Event</p>
            </td>

            <td>
                <img src="event3.jpg"
                     alt="Food Fair"
                     title="Food Fair"
                     class="eventImage">

                <p>Food Fair</p>
            </td>

        </tr>

        <tr>

            <td>
                <img src="event4.jpg"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">

                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="event5.jpg"
                     alt="Workshop"
                     title="Workshop"
                     class="eventImage">

                <p>Workshop</p>
            </td>

            <td>
                <img src="event6.jpg"
                     alt="Charity Run"
                     title="Charity Run"
                     class="eventImage">

                <p>Charity Run</p>
            </td>

        </tr>

    </table>

</body>

</html>
