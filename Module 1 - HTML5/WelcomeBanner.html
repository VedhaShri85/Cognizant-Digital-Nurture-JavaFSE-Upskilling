<!DOCTYPE html>
<html>

<head>

    <title>Welcome Banner</title>

    <style>

        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div id="welcomeBanner">

        <h2>Welcome Back User!</h2>

        <p>
            Grab your
            <span style="color:red;font-weight:bold;">
                Special 20% Event Discount
            </span>
            today.
        </p>

    </div>

    <p class="highlight">
        Registration closes soon!
    </p>

</body>

</html>
