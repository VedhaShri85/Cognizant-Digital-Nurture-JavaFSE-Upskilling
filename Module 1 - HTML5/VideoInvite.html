<!DOCTYPE html>
<html>

<head>

    <title>Video Invite</title>

    <script>

        function videoReady() {

            document.getElementById("message")
                .innerHTML =
                "Video Ready To Play";

        }

        window.onbeforeunload = function () {

            return "You have unsaved data. Are you sure you want to leave?";

        };

    </script>

</head>

<body>

    <h2>Community Event Invitation</h2>

    <video width="500"
           controls
           oncanplay="videoReady()">

        <source src="eventpromo.mp4"
                type="video/mp4">

    </video>

    <p id="message"></p>

</body>

</html>
